<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пруткон | Системные справочники</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..700;1,100..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=19.0.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="with-hero-bg">
    <div class="app-container">
        <aside id="global-sidebar"></aside>

        <main class="main-content">
            <header class="top-header no-print">
                <div class="view-header"><h2>Системные справочники</h2></div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="window.manageDirCategories()" title="Настройка разделов"><i class="fa-solid fa-folder-tree emerald"></i></button>
                    <button class="btn btn-primary btn-sm" onclick="window.startDirectoryAddWizard()"><i class="fa-solid fa-plus-circle"></i> Добавить запись</button>
                    <button class="btn btn-secondary btn-sm" onclick="window.openDirectoryExcelImport()" title="Импорт из Excel"><i class="fa-solid fa-file-excel"></i></button>
                    <button class="btn btn-secondary btn-sm" onclick="window.refreshDirectories()"><i class="fa-solid fa-rotate"></i></button>
                </div>
            </header>

            <section class="view-section active">
                <div id="directory-tabs" class="tabs-scrollable mb-4">
                    <!-- Будет заполнено через directories.js -->
                </div>

                <div class="panel glass-panel">
                    <div class="flex justify-between items-center mb-4">
                        <h4 id="directory-title" class="mb-0">Загрузка...</h4>
                        <div class="flex gap-2 items-center">
                            <button id="dir-mass-delete-btn" class="btn btn-danger btn-sm hidden" onclick="window.massDeleteDirectories()">Удалить выбранные</button>
                            <input type="text" id="dir-search-input" class="form-control" placeholder="Поиск по названию..." style="width:250px;" oninput="window.updateDirSearch(this.value)">
                        </div>
                    </div>

                    <div id="dir-dynamic-filters" class="flex flex-wrap gap-2 mb-4 padding-15" style="background:rgba(0,0,0,0.2); border-radius:12px; border:1px solid var(--border-glass);">
                        <!-- Фильтры -->
                    </div>

                    <div class="table-wrapper">
                        <table class="data-table" id="directory-table">
                            <!-- Таблица -->
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL: ADD/EDIT DIRECTORY RECORD -->
    <div id="directory-modal" class="modal">
        <div class="glass-panel" style="width:850px; padding:35px; max-height: 90vh; display: flex; flex-direction: column;">
            <h3 id="dir-modal-title" class="mb-4 brand-red">Новая запись</h3>
            <form id="directory-form" style="flex: 1; overflow-y: auto; padding-right: 15px;">
                <input type="hidden" id="dir-id">
                
                <div class="panel-section mb-4">
                    <h5 class="section-title"><i class="fa-solid fa-tag"></i> Основная информация</h5>
                    <div class="form-group">
                        <label>Название / Код (Артикул)</label>
                        <input type="text" id="dir-name" class="form-control" placeholder="Например: 10-OMZ" required>
                    </div>
                </div>

                <div id="dir-schema-fields-container">
                    <div id="dir-schema-fields" class="grid grid-2 gap-3">
                        <!-- Поля из схемы будут вставлены сюда -->
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-5 pb-2">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('directory-modal').classList.remove('active')">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить запись</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: CATEGORY MANAGEMENT -->
    <div id="dir-cat-modal" class="modal">
        <div class="glass-panel" style="width:600px; padding:35px;">
            <h3 class="mb-4 brand-red">Настройка разделов справочника</h3>
            <div id="dir-cat-list" class="flex flex-col gap-2 mb-4" style="max-height:300px; overflow-y:auto;">
                <!-- Список категорий -->
            </div>
            <button class="btn btn-primary w-100" onclick="window.addNewDirCategory()">+ Добавить новый раздел</button>
            <div class="mt-4 flex justify-end">
                <button class="btn btn-secondary" onclick="document.getElementById('dir-cat-modal').classList.remove('active')">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/layout/header.js?v=19.0.0"></script>
    <script src="js/layout/menu.js?v=19.0.0"></script>
    <script src="js/layout/footer.js?v=19.0.0"></script>
    <script src="js/core/i18n.js?v=19.0.0"></script>
    <script src="js/core/version_history.js?v=19.0.0"></script>
    <script src="js/core/firebase_config.js"></script>
    <script src="js/core/core.js?v=19.0.0"></script>
    <script src="js/handlers/directories.js?v=19.0.0"></script>
</body>
</html>
